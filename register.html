<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vendor Registration</title>
<style>
  body {
    background: #f4f5f7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    margin: 0;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }
  .card-wrap { max-width: 520px; margin: 0 auto; }
  .header {
    background: #0C447C;
    border-radius: 10px 10px 0 0;
    padding: 1.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header p { font-size: 11px; letter-spacing: 0.12em; color: #85B7EB; margin: 0 0 4px; text-transform: uppercase; font-weight: 500; }
  .header h1 { font-size: 20px; font-weight: 500; color: #E6F1FB; margin: 0; }
  .header-icon { width: 40px; height: 40px; border-radius: 4px; background: #185FA5; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .subbar { background: #185FA5; padding: 8px 2rem; }
  .subbar p { font-size: 12px; color: #B5D4F4; margin: 0; }
  .subbar .req { color: #F09595; }
  .body-card {
    background: #ffffff; border: 0.5px solid #d8dade; border-top: none;
    border-radius: 0 0 10px 10px; padding: 2rem;
  }
  .field { margin-bottom: 1.5rem; }
  label {
    display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 6px;
  }
  label .req { color: #d23b3b; }
  input[type="text"], input[type="email"], input[type="tel"], input[type="url"] {
    width: 100%; box-sizing: border-box; border-radius: 4px;
    border: 1px solid #c7c9cf; padding: 10px 12px; font-size: 14px;
  }
  input:focus { outline: 2px solid #185FA5; outline-offset: -1px; }
  #error-msg, #success-msg {
    display: none; margin-top: 1.25rem; font-size: 13px; border-radius: 4px; padding: 10px 14px;
  }
  #error-msg { color: #b42318; background: #fdeeee; border-left: 3px solid #E24B4A; }
  #success-msg { color: #1e6b2e; background: #eaf6ec; border-left: 3px solid #639922; }
  .footer-row {
    margin-top: 2rem; padding-top: 1.5rem; border-top: 0.5px solid #e2e3e7;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .footer-row p { font-size: 12px; color: #888; margin: 0; }
  button#register-btn {
    padding: 9px 22px; font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
    background: #0C447C; border: none; border-radius: 4px; color: #E6F1FB; cursor: pointer;
  }
  button#register-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-link { text-align: center; margin-top: 1.25rem; font-size: 13px; color: #555; }
  .login-link a { color: #0C447C; text-decoration: underline; }
  .legal-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 1rem; padding: 0 4px;
  }
  .legal-row p { font-size: 11px; color: #999; margin: 0; }
</style>
</head>
<body>

<div class="card-wrap">
  <div class="header">
    <div>
      <p>Lead Capture Platform</p>
      <h1>Vendor registration</h1>
    </div>
    <div class="header-icon">🏢</div>
  </div>

  <div class="subbar">
    <p>Create your vendor account &nbsp;|&nbsp; Fields marked <span class="req">*</span> are mandatory</p>
  </div>

  <div class="body-card">

    <div id="registration-form">
      <div class="field">
        <label for="fullname">Full legal name <span class="req">*</span></label>
        <input id="fullname" type="text" placeholder="e.g. Jonathan M. Reeves" />
      </div>

      <div class="field">
        <label for="companyname">Company name <span class="req">*</span></label>
        <input id="companyname" type="text" placeholder="e.g. Acme Corporation" />
      </div>

      <div class="field">
        <label for="email">Email address <span class="req">*</span></label>
        <input id="email" type="email" placeholder="e.g. j.reeves@acmecorp.com" />
      </div>

      <div class="field">
        <label for="phone">Phone number <span class="req">*</span></label>
        <input id="phone" type="tel" placeholder="e.g. +254 712 345 678" />
      </div>

      <div class="field">
        <label for="website">Company website</label>
        <input id="website" type="url" placeholder="e.g. https://acmecorp.com" />
      </div>

      <div class="field">
        <label for="logo">Logo or photo <span style="color:#999; font-weight:400; text-transform:none;">(optional — shown on your event form)</span></label>
        <input id="logo" type="file" accept="image/png,image/jpeg,image/webp,image/gif"
          style="width:100%; box-sizing:border-box; border-radius:4px; border:1px solid #c7c9cf;
                 padding:8px 12px; font-size:13px; background:#fff; cursor:pointer;" />
        <p style="font-size:11px; color:#999; margin:4px 0 0;">PNG, JPG or WebP · max 2 MB</p>
      </div>

      <div class="field">
        <label for="password">Password <span class="req">*</span></label>
        <input id="password" type="password" placeholder="Min 8 chars, upper, lower, number, symbol" />
      </div>

      <div id="error-msg"><span id="error-text"></span></div>

      <div class="footer-row">
        <p></p>
        <button id="register-btn" type="button">Create account →</button>
      </div>

      <div class="login-link">
        Already have an account? <a href="/">Log in</a>
      </div>
    </div>

    <div id="verification-form" style="display:none;">
      <p id="verify-email-label" style="font-size: 13px; color: #555; margin-bottom: 1.5rem; line-height: 1.6;"></p>

      <div class="field">
        <label for="verify-code">Verification code <span class="req">*</span></label>
        <input id="verify-code" type="text" placeholder="Enter 6-digit code" maxlength="6"
          style="letter-spacing: 0.2em; font-size: 18px; text-align: center;" />
      </div>

      <div id="verify-error" style="display:none; margin-bottom: 1rem; font-size: 13px;
        padding: 10px 14px; border-radius: 4px; border-left: 3px solid #E24B4A;
        background: #fdeeee; color: #b42318;"></div>

      <div style="display: flex; gap: 8px; margin-top: 1rem;">
        <button id="verify-btn" type="button" style="flex: 1; padding: 10px; font-size: 14px;
          font-weight: 500; background: #0C447C; border: none; border-radius: 4px;
          color: #E6F1FB; cursor: pointer;">
          Verify account
        </button>
        <button id="resend-btn" type="button" style="padding: 10px 16px; font-size: 13px;
          background: white; border: 1px solid #c7c9cf; border-radius: 4px;
          color: #555; cursor: pointer;">
          Resend code
        </button>
      </div>
    </div>

    <div id="success-msg"></div>

  </div>
  <div class="legal-row">
    <p>© 2026 Lead Capture Platform. All rights reserved.</p>
    <p>Privacy Policy · Terms of Use</p>
  </div>
</div>

<script type="module" src="./src/register.js"></script>
</body>
</html>
