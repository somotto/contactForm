<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Registration — Acme Corporation</title>
<style>
  body {
    background: #f4f5f7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    margin: 0;
    padding: 2rem 1rem;
    color: #1a1a1a;
  }
  .card-wrap { max-width: 520px; margin: 0 auto; }
  .header {
    background: #0C447C;
    border-radius: 10px 10px 0 0;
    padding: 1.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header p { font-size: 11px; letter-spacing: 0.12em; color: #85B7EB; margin: 0 0 4px; text-transform: uppercase; font-weight: 500; }
  .header h1 { font-size: 20px; font-weight: 500; color: #E6F1FB; margin: 0; }
  .header-icon {
    width: 40px; height: 40px; border-radius: 4px; background: #185FA5;
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .subbar { background: #185FA5; padding: 8px 2rem; }
  .subbar p { font-size: 12px; color: #B5D4F4; margin: 0; }
  .subbar .req { color: #F09595; }
  .body-card {
    background: #ffffff; border: 0.5px solid #d8dade; border-top: none;
    border-radius: 0 0 10px 10px; padding: 2rem;
  }
  .field { margin-bottom: 1.5rem; }
  label {
    display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase; color: #555; margin-bottom: 6px;
  }
  label .req { color: #d23b3b; }
  input[type="text"], input[type="email"], input[type="tel"] {
    width: 100%; box-sizing: border-box; border-radius: 4px;
    border: 1px solid #c7c9cf; padding: 10px 12px; font-size: 14px;
  }
  input:focus { outline: 2px solid #185FA5; outline-offset: -1px; }
  .consent-box {
    border: 0.5px solid #d8dade; border-radius: 4px; padding: 14px 16px; background: #f7f8fa;
  }
  .consent-box label { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; text-transform: none; font-weight: 400; }
  .consent-box input[type="checkbox"] { margin-top: 2px; accent-color: #0C447C; width: 15px; height: 15px; flex-shrink: 0; cursor: pointer; }
  .consent-box .main-text { font-size: 13px; color: #1a1a1a; line-height: 1.5; }
  .consent-box .sub-text { color: #888; font-size: 12px; display: block; margin-top: 4px; }
  .consent-box a { color: #185FA5; text-decoration: underline; }
  #error-msg, #success-msg {
    display: none; margin-top: 1.25rem; font-size: 13px; border-radius: 0; padding: 10px 14px;
  }
  #error-msg { color: #b42318; background: #fdeeee; border-left: 3px solid #E24B4A; }
  #success-msg { color: #1e6b2e; background: #eaf6ec; border-left: 3px solid #639922; }
  .footer-row {
    margin-top: 2rem; padding-top: 1.5rem; border-top: 0.5px solid #e2e3e7;
    display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap;
  }
  .footer-row p { font-size: 12px; color: #888; margin: 0; }
  button#submit-btn {
    padding: 9px 22px; font-size: 13px; font-weight: 500; letter-spacing: 0.04em;
    background: #0C447C; border: none; border-radius: 4px; color: #E6F1FB; cursor: pointer;
  }
  button#submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .legal-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 1rem; padding: 0 4px;
  }
  .legal-row p { font-size: 11px; color: #999; margin: 0; }
</style>
</head>
<body>

<div class="card-wrap">
  <div class="header">
    <div>
      <p>Acme Corporation</p>
      <h1>Contact registration</h1>
    </div>
    <div class="header-icon">🏢</div>
  </div>

  <div class="subbar">
    <p>Form Ref: CR-2026 &nbsp;|&nbsp; All fields marked <span class="req">*</span> are mandatory</p>
  </div>

  <div class="body-card">
    <div class="field">
      <label for="fullname">Full legal name <span class="req">*</span></label>
      <input id="fullname" type="text" placeholder="e.g. Jonathan M. Reeves" />
    </div>

    <div class="field">
      <label for="email">Corporate email address <span class="req">*</span></label>
      <input id="email" type="email" placeholder="e.g. j.reeves@acmecorp.com" />
    </div>

    <div class="field">
      <label for="phone">Direct telephone <span class="req">*</span></label>
      <input id="phone" type="tel" placeholder="e.g. +1 212 555 0100" />
    </div>

    <div class="consent-box">
      <label>
        <input id="consent" type="checkbox" />
        <span class="main-text">
          I consent to Acme Corporation contacting me by telephone or email regarding this registration and relevant business communications.
          <span class="sub-text">Optional. You may withdraw this consent at any time. See our <a href="#">Privacy Policy</a> for details.</span>
        </span>
      </label>
    </div>

    <div id="error-msg"><span id="error-text"></span></div>
    <div id="success-msg">Registration received. A representative will follow up within 2 business days.</div>

    <div class="footer-row">
      <p>🔒 Confidential — internal use only</p>
      <button id="submit-btn" type="button">Submit registration →</button>
    </div>
  </div>

  <div class="legal-row">
    <p>© 2026 Acme Corporation. All rights reserved.</p>
    <p>Privacy Policy · Terms of Use</p>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
