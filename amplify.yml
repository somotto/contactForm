version: 1
backend:
  phases:
    build:
      commands:
        - nvm use 22
        - npm install
frontend:
  phases:
    build:
      commands:
        - nvm use 22
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
